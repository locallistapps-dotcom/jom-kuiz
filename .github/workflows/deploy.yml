name: Build & Deploy Jom Kuiz to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:

  build:
    name: Build Flutter Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version info
        run: flutter --version

      - name: Install pub dependencies
        working-directory: jom_kuiz
        run: flutter pub get

      - name: Analyse Dart code
        working-directory: jom_kuiz
        run: flutter analyze --no-fatal-warnings

      - name: Generate PWA icons
        run: |
          ICONS_DIR="jom_kuiz/web/icons"
          mkdir -p "$ICONS_DIR"

          generate_icon() {
            local dest="$1"
            local size="$2"
            local font_size="$3"
            if [ -f "$dest" ]; then
              echo "  skipping $dest (already exists)"
              return
            fi
            echo "  generating $dest (${size}x${size})"
            magick -size "${size}x${size}" \
              radial-gradient:"#1976D2"-"#0D47A1" \
              -fill white \
              -font DejaVu-Sans-Bold \
              -pointsize "$font_size" \
              -gravity center \
              -annotate 0 "JK" \
              "$dest"
          }

          generate_icon "$ICONS_DIR/Icon-192.png"          192  72
          generate_icon "$ICONS_DIR/Icon-512.png"          512 192
          generate_icon "$ICONS_DIR/Icon-maskable-192.png" 192  60
          generate_icon "$ICONS_DIR/Icon-maskable-512.png" 512 160

          if [ ! -f "jom_kuiz/web/favicon.png" ]; then
            magick -size 32x32 \
              radial-gradient:"#1976D2"-"#0D47A1" \
              -fill white -font DejaVu-Sans-Bold -pointsize 16 \
              -gravity center -annotate 0 "J" \
              "jom_kuiz/web/favicon.png"
          fi

      - name: Build Flutter web (release)
        working-directory: jom_kuiz
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build web \
            --release \
            --base-href "/jom-kuiz/" \
            --pwa-strategy offline-first \
            --dart-define="SUPABASE_URL=${SUPABASE_URL}" \
            --dart-define="SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}" \
            --dart-define="APP_ENV=production"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: jom_kuiz/build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
