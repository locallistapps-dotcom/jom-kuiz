<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for the base URL injected by Flutter at build time.
    $FLUTTER_BASE_HREF is replaced by `flutter build web --base-href`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Jom Kuiz – Malaysian Education Quiz Platform for parents and students.">

  <!-- PWA / mobile web -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jom Kuiz">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1565C0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- Open Graph (social sharing) -->
  <meta property="og:title" content="Jom Kuiz">
  <meta property="og:description" content="Malaysian Education Quiz Platform">
  <meta property="og:type" content="website">

  <!-- Icons -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">
  <link rel="icon" type="image/png" href="favicon.png">

  <title>Jom Kuiz</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <style>
    /* Prevent white flash before Flutter renders */
    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #1565C0;
    }

    /* Full-screen loading spinner shown before Flutter initialises */
    #loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      gap: 16px;
    }

    #loading .spinner {
      width: 48px;
      height: 48px;
      border: 5px solid rgba(255, 255, 255, 0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    #loading .label {
      color: rgba(255, 255, 255, 0.85);
      font-family: sans-serif;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Shown while Flutter engine loads; hidden once the app renders -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="label">Jom Kuiz sedang memuatkan…</div>
  </div>

  <!--
    This script bootstraps the Flutter web engine.
    Generated by `flutter build web`; do not edit manually.
  -->
  <script>
    // Hide the loading screen once Flutter signals it is ready.
    window.addEventListener('flutter-first-frame', function () {
      var loading = document.getElementById('loading');
      if (loading) loading.style.display = 'none';
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
